<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Duke Nukem: Crypto Carnage</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
  body { background: #0a0a0a; font-family: monospace; color: #00ff41; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  canvas { border: 2px solid #ff6600; width: 95vw; max-width: 640px; height: auto; }
  #hud { width: 95vw; max-width: 640px; background: #111; border: 1px solid #ff6600; padding: 5px; display: flex; justify-content: space-between; font-size: 10px; color: #ffaa00; }
  .controls { display: flex; width: 100%; max-width: 640px; justify-content: space-between; padding: 15px; position: fixed; bottom: 20px; }
  .btn { width: 65px; height: 65px; background: rgba(255,102,0,0.2); border: 2px solid #ff6600; color: white; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; }
  .btn:active { background: rgba(255,102,0,0.5); }
</style>
</head>
<body>
<canvas id="canvas" width="640" height="400"></canvas>
<div id="hud"><span>HP: <span id="hp">100</span></span><span>COINS: <span id="coins">0</span></span><span>$DUKE: <span id="balance">0.00</span></span></div>
<div class="controls">
  <div style="display:flex; gap:10px;">
    <div class="btn" id="leftBtn">←</div>
    <div class="btn" id="rightBtn">→</div>
  </div>
  <div class="btn" id="jumpBtn">JUMP</div>
</div>
<script>
const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); const W = 640, H = 400;
let state = { hp: 100, coins: 0, balance: 0, gameOver: false };
let duke = { x: 80, y: 300, w: 36, h: 54, vx: 0, vy: 0, onGround: false };
let bullets = [], enemies = [], platforms = [{x:0,y:370,w:640,h:30},{x:80,y:290,w:120,h:12},{x:280,y:240,w:100,h:12},{x:450,y:200,w:130,h:12}];
const keys = {};

const setupBtn = (id, key) => {
  const el = document.getElementById(id);
  el.addEventListener('touchstart', (e) => { e.preventDefault(); keys[key] = true; });
  el.addEventListener('touchend', (e) => { e.preventDefault(); keys[key] = false; });
};
setupBtn('leftBtn', 'KeyA'); setupBtn('rightBtn', 'KeyD'); setupBtn('jumpBtn', 'Space');

canvas.addEventListener('touchstart', (e) => { 
  if(state.gameOver) { state.hp=100; state.gameOver=false; enemies=[]; return; }
  const r = canvas.getBoundingClientRect(); const t = e.touches[0];
  const tx = (t.clientX - r.left) * (W/r.width); const ty = (t.clientY - r.top) * (H/r.height);
  const dx = tx-(duke.x+18), dy = ty-(duke.y+27), len = Math.sqrt(dx*dx+dy*dy);
  bullets.push({x:duke.x+18, y:duke.y+27, vx:(dx/len)*10, vy:(dy/len)*10, life:50});
});

function update() {
  if(state.gameOver) return;
  if(keys['KeyA']) duke.vx=-4.5; else if(keys['KeyD']) duke.vx=4.5; else duke.vx*=0.8;
  if(keys['Space'] && duke.onGround) duke.vy=-14;
  duke.vy+=0.7; duke.x+=duke.vx; duke.y+=duke.vy;
  duke.onGround=false; platforms.forEach(p=>{ if(duke.x+36>p.x && duke.x<p.x+p.w && duke.y+54>p.y && duke.y+54<p.y+15 && duke.vy>=0){ duke.y=p.y-54; duke.vy=0; duke.onGround=true; } });
  bullets.forEach((b,i)=>{ b.x+=b.vx; b.y+=b.vy; b.life--; if(b.life<=0) bullets.splice(i,1); });
  if(Math.random()<0.02) enemies.push({x:W, y:326, w:30, h:44, vx:-2.5, hp:2});
  enemies.forEach((e,i)=>{ 
    e.x+=e.vx; if(duke.x<e.x+30 && duke.x+36>e.x && duke.y<e.y+44 && duke.y+54>e.y){ state.hp-=1; if(state.hp<=0) state.gameOver=true; }
    bullets.forEach((b,bi)=>{ if(b.x>e.x && b.x<e.x+30 && b.y>e.y && b.y<e.y+44){ enemies.splice(i,1); bullets.splice(bi,1); state.coins++; state.balance+=0.05; } });
  });
  document.getElementById('hp').textContent=Math.ceil(state.hp); document.getElementById('coins').textContent=state.coins; document.getElementById('balance').textContent=state.balance.toFixed(2);
}

function draw() {
  ctx.fillStyle='#050505'; ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#1a1a1a'; platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));
  ctx.fillStyle='red'; enemies.forEach(e=>ctx.fillRect(e.x,e.y,e.w,e.h));
  ctx.fillStyle='white'; bullets.forEach(b=>ctx.fillRect(b.x,b.y,4,4));
  ctx.fillStyle='yellow'; ctx.fillRect(duke.x,duke.y,36,54);
  if(state.gameOver){ ctx.fillStyle='red'; ctx.font='40px Courier'; ctx.textAlign='center'; ctx.fillText('GAME OVER', W/2, H/2); ctx.font='20px Courier'; ctx.fillText('TAP TO RESTART', W/2, H/2+40); }
}
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
