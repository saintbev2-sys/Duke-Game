<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Duke Nukem: Crypto Carnage</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0a0a; font-family: 'Courier New', monospace; color: #00ff41; overflow: hidden; height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  canvas { border: 3px solid #ff6600; box-shadow: 0 0 30px #ff6600; image-rendering: pixelated; }
  #hud { width: 640px; background: #111; border: 2px solid #ff6600; border-top: none; padding: 6px 12px; display: flex; justify-content: space-between; font-size: 13px; color: #ffaa00; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; }
  #title-bar { width: 640px; background: linear-gradient(90deg, #1a0000, #330000, #1a0000); border: 2px solid #ff6600; border-bottom: none; padding: 6px 12px; display: flex; justify-content: space-between; align-items: center; font-size: 16px; color: #ff6600; font-weight: bold; letter-spacing: 3px; text-shadow: 0 0 10px #ff6600; }
  #quote { color: #aaa; font-size: 10px; font-style: italic; }
  #controls { width: 640px; background: #0a0a0a; padding: 4px 12px; font-size: 10px; color: #555; display: flex; gap: 16px; }
  .key { color: #ff6600; }
</style>
</head>
<body>
<div id="title-bar"><span>☢ DUKE NUKEM: CRYPTO CARNAGE ☢</span><span id="quote">"IT'S TIME TO MINE AND CHEW BUBBLEGUM"</span></div>
<canvas id="canvas" width="640" height="400"></canvas>
<div id="hud"><span>❤ HP: <span id="hp">100</span></span><span>💰 COINS: <span id="coins">0</span></span><span>⛏ HASH: <span id="hashrate">0</span> H/s</span><span>💋 SCORE: <span id="score">0</span></span><span>🪙 $DUKE: <span id="balance">0.000000</span></span></div>
<div id="controls"><span><span class="key">A/D</span> MOVE</span><span><span class="key">SPACE</span> JUMP</span><span><span class="key">CLICK</span> SHOOT</span><span><span class="key">E</span> MINE</span><span><span class="key">R</span> RESTART</span></div>
<script>
const canvas = document.getElementById('canvas'); const ctx = canvas.getContext('2d'); const W = 640, H = 400;
let state = { hp: 100, coins: 0, balance: 0, hashrate: 0, score: 0, gameOver: false };
let duke = { x: 80, y: 300, w: 36, h: 54, vx: 0, vy: 0, onGround: false, facing: 1, shooting: false, shootTimer: 0, mining: false, mineTimer: 0 };
let bullets = [], enemies = [], particles = [], floatingTexts = [];
const platforms = [{x:0,y:370,w:640,h:30},{x:80,y:290,w:120,h:12},{x:280,y:240,w:100,h:12},{x:450,y:200,w:130,h:12},{x:160,y:170,w:90,h:12},{x:340,y:310,w:80,h:12},{x:520,y:290,w:80,h:12}];
let miningNodes = [{x:110,y:258,active:true,cooldown:0,glow:0},{x:320,y:205,active:true,cooldown:0,glow:0},{x:490,y:165,active:true,cooldown:0,glow:0},{x:200,y:138,active:true,cooldown:0,glow:0},{x:365,y:275,active:true,cooldown:0,glow:0}];
const dukeQuotes = ["Hail to the king, baby!", "Eat lead!", "Come get some!"];
let quoteTimer = 300, enemySpawnTimer = 180;
let bgStars = Array.from({length:60},()=>({x:Math.random()*W,y:Math.random()*H*0.6,s:Math.random()*2+0.5,t:Math.random()*60}));
const keys = {}; document.addEventListener('keydown', e => { keys[e.code]=true; if(e.code==='KeyR')resetGame(); }); document.addEventListener('keyup', e => keys[e.code]=false);
canvas.addEventListener('click', e => { if(state.gameOver)return; const r=canvas.getBoundingClientRect(); shoot(e.clientX-r.left, e.clientY-r.top); });
function shoot(tx,ty) { const bx=duke.x+duke.w/2,by=duke.y+duke.h/2,dx=tx-bx,dy=ty-by,len=Math.sqrt(dx*dx+dy*dy); bullets.push({x:bx,y:by,vx:(dx/len)*12,vy:(dy/len)*12,life:40}); duke.facing=dx>0?1:-1; duke.shooting=true; duke.shootTimer=8; }
function resetGame() { state={hp:100,coins:0,balance:0,hashrate:0,score:0,gameOver:false}; duke={x:80,y:300,w:36,h:54,vx:0,vy:0,onGround:false,facing:1,shooting:false,shootTimer:0,mining:false,mineTimer:0}; bullets=[];enemies=[];particles=[];floatingTexts=[]; miningNodes.forEach(n=>{n.active=true;n.cooldown=0;n.glow=0;}); }
function collide(a,b){return a.x<b.x+b.w&&a.x+a.w>b.x&&a.y<b.y+b.h&&a.y+a.h>b.y;}
function resolveVsPlats(obj){ obj.onGround=false; for(const p of platforms){ if(obj.x+obj.w>p.x&&obj.x<p.x+p.w){ if(obj.y+obj.h>p.y&&obj.y+obj.h<p.y+p.h+12&&obj.vy>=0){ obj.y=p.y-obj.h;obj.vy=0;obj.onGround=true; } } } }
function spawnParticles(x,y,color,n=8){ for(let i=0;i<n;i++){ const a=Math.random()*Math.PI*2,s=Math.random()*4+1; particles.push({x,y,vx:Math.cos(a)*s,vy:Math.sin(a)*s,life:30+Math.random()*20,color}); } }
function addFloat(x,y,text,color='#ffff00'){floatingTexts.push({x,y,text,color,life:60,vy:-1});}
function update(){
  if(state.gameOver)return;
  if(keys['KeyA']) duke.vx=-3.5; else if(keys['KeyD']) duke.vx=3.5; else duke.vx*=0.7;
  if(keys['Space']&&duke.onGround) duke.vy=-13;
  if(keys['KeyE']){
    let nearest=null,nearDist=65;
    for(const n of miningNodes){ if(!n.active)continue; const d=Math.hypot(duke.x+duke.w/2-n.x,duke.y+duke.h/2-n.y); if(d<nearDist){nearest=n;nearDist=d;} }
    if(nearest){ duke.mining=true; duke.mineTimer++; nearest.glow=Math.min(nearest.glow+0.05,1); if(duke.mineTimer>=60){ state.balance+=0.000001; state.coins++; nearest.active=false; nearest.cooldown=600; duke.mineTimer=0; spawnParticles(nearest.x,nearest.y,'#ffff00',16); } }
  } else duke.mining=false;
  duke.vy+=0.6; duke.x+=duke.vx; duke.y+=duke.vy; resolveVsPlats(duke);
  bullets.forEach((b,i)=>{b.x+=b.vx;b.y+=b.vy;b.life--; if(b.life<=0)bullets.splice(i,1);});
  enemySpawnTimer--; if(enemySpawnTimer<=0){ enemies.push({x:W,y:316,w:30,h:44,vx:-1.5,vy:0,hp:3}); enemySpawnTimer=180; }
  enemies.forEach((e,i)=>{ e.x+=e.vx; resolveVsPlats(e); if(collide(duke,e))state.hp-=0.5; if(state.hp<=0)state.gameOver=true; bullets.forEach((b,bi)=>{if(collide({x:b.x,y:b.y,w:4,h:4},e)){e.hp--;bullets.splice(bi,1);if(e.hp<=0)enemies.splice(i,1);}}); });
  document.getElementById('hp').textContent=Math.ceil(state.hp); document.getElementById('coins').textContent=state.coins; document.getElementById('balance').textContent=state.balance.toFixed(6);
}
function draw(){
  ctx.fillStyle='#050505'; ctx.fillRect(0,0,W,H);
  bgStars.forEach(s=>{ ctx.fillStyle='white'; ctx.fillRect(s.x,s.y,s.s,s.s); });
  platforms.forEach(p=>{ ctx.fillStyle='#1a1a1a'; ctx.fillRect(p.x,p.y,p.w,p.h); ctx.strokeStyle='#ff6600'; ctx.strokeRect(p.x,p.y,p.w,p.h); });
  miningNodes.forEach(n=>{ ctx.fillStyle=n.active?'#00ffaa':'#333'; ctx.fillRect(n.x-8,n.y-8,16,16); });
  enemies.forEach(e=>{ ctx.fillStyle='red'; ctx.fillRect(e.x,e.y,e.w,e.h); });
  bullets.forEach(b=>{ ctx.fillStyle='white'; ctx.fillRect(b.x,b.y,4,4); });
  ctx.fillStyle='yellow'; ctx.fillRect(duke.x,duke.y,duke.w,duke.h); // Simplified Duke
  if(state.gameOver){ ctx.fillStyle='red'; ctx.font='40px Arial'; ctx.fillText('GAME OVER', 200, 200); }
}
function loop(){ update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
